spring.application.name=test-management-tool

# ─── PostgreSQL ───────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/test_management_db
spring.datasource.username=postgres
spring.datasource.password=root@123
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true
spring.jackson.serialization.fail-on-empty-beans=false
spring.cache.type=simple

# ─── Flyway ──────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── Redis ───────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# ─── JWT ─────────────────────────────────────────────────────
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=86400000

# ─── Rate Limiting ───────────────────────────────────────────
app.rate-limit.requests-per-minute=100

# ─── Jira Integration ────────────────────────────────────────
app.jira.base-url=https://your-domain.atlassian.net
app.jira.username=your@email.com
app.jira.api-token=your-jira-api-token
app.jira.project-key=PROJ

# ─── File Upload / S3 ────────────────────────────────────────
app.storage.type=local
app.storage.local.path=/tmp/test-management/uploads
# For S3: set type=s3 and fill below
app.storage.s3.bucket=your-bucket
app.storage.s3.region=ap-south-1

# ─── Server ──────────────────────────────────────────────────
server.port=8080
server.error.include-message=always

# ─── Logging ─────────────────────────────────────────────────
logging.level.com.testmgmt=DEBUG
logging.level.org.springframework.security=WARN

# ─── Actuator ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ─── OpenAPI / Swagger ───────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
